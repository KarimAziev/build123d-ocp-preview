name: CI & Publish

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Node.js (needed for Pyright)
        uses: actions/setup-node@v6
        with:
          node-version: current

      - name: Install dependencies
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e ".[dev,build123d]" pytest-cov

      - name: Install Pyright
        run: npm install -g pyright

      - name: Run Pyright static type checker
        run: pyright --pythonpath .venv/bin/python ./build123d_ocp_preview ./tests/

      - name: Lint code
        run: |
          .venv/bin/python -m ruff check .
          .venv/bin/python -m ruff format --check .

      - name: Run tests with coverage
        run: |
          .venv/bin/python -m pytest tests \
            --cov=build123d_ocp_preview \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}


  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools

      - name: Build the package
        run: python -m build

      - name: Verify dist directory
        run: ls -al dist/

      - name: Upload the dist directory as an artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - build
      - lint-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Download the dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist

      - name: Verify contents of dist directory after artifact download
        run: |
          echo "Listing contents of the workspace:"
          ls -al

      - name: Organize artifact files into dist/
        run: |
          mkdir -p dist  # Create the dist directory if it doesn't exist
          echo "Moving downloaded files to dist/..."
          mv build123d_ocp_preview-*.whl build123d_ocp_preview-*.tar.gz dist/  # Move files matching artifact content into dist/
          echo "Contents of workspace after organizing:"
          ls -al
          echo "Contents of 'dist/' after organizing:"
          ls -al dist/

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install Twine
        run: |
          python -m pip install --upgrade pip
          pip install twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
